version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: duoduo-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Duoduo@1234
      MYSQL_DATABASE: duoduo_jxc
      MYSQL_USER: duoduo
      MYSQL_PASSWORD: Duoduo@1234
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    container_name: duoduo-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: