spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/duoduo_jxc_test?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&nullCatalogMeansCurrent=true
    username: root
    password: ${DB_PASSWORD:Root@1234}
    hikari:
      connection-init-sql: "SET NAMES utf8mb4"
  sql:
    init:
      mode: always
      schema-locations: 
        - classpath:sql/test_schema.sql
      data-locations:

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

flowable:
  database-schema-update: false
  database-type: mysql
  async-executor-activate: false
  history-level: full
  check-process-definitions: false
