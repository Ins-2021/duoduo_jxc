spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./target/wf_persist_db;MODE=MySQL;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    hikari:
      connection-init-sql: "SELECT 1"
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:sql/test_schema.sql
      data-locations:

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

flowable:
  database-schema-update: true
  database-type: mysql
  async-executor-activate: false
  history-level: full
