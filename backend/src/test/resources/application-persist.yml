spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./target/wf_persist_db;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:sql/test_schema.sql
      data-locations:

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

flowable:
  database-schema-update: true
  async-executor-activate: false
  history-level: full
